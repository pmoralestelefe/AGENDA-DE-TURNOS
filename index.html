<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos Programados</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #00bcd4;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --danger: #ff5252;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .header img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
            object-fit: contain;
        }
        .header h1 {
            font-size: 24px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: var(--text-main);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row > div {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0097a7;
        }
        .btn-maps { background-color: #4CAF50; color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; }
        
        #listaTurnosContainer {
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .turno-card {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
        }
        .turno-card p { margin: 5px 0; font-size: 14px; }
        .turno-card h4 { margin: 0 0 10px 0; color: var(--primary-color); }

        #mensajeError {
            color: var(--danger);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Logo">
        <h1>Turnos Programados</h1>
    </div>

    <form id="turnoForm">
        <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="cliente" required>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="telefono" required>
            </div>
            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="direccion" required>
            </div>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fecha" required>
            </div>
            <div class="form-group">
                <label>Día</label>
                <input type="text" id="diaVisual" readonly style="background-color: #1a1a1a; color: #888;">
            </div>
        </div>

        <div class="form-group">
            <label>Hora (Lun-Vie: 09:00 a 14:00 | Sáb: 14:00 a 18:00)</label>
            <input type="time" id="hora" required>
        </div>

        <div class="form-group">
            <label>Descripción del Servicio (Portón, motor, etc.)</label>
            <textarea id="descripcion" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Precio a cobrar ($)</label>
            <input type="number" id="precio">
        </div>

        <div id="mensajeError"></div>

        <button type="submit" id="btnGuardar">Guardar Turno</button>
        <button type="button" class="btn-maps" id="btnMaps" style="display: none;">Abrir en Google Maps</button>
        <button type="button" class="btn-whatsapp" id="btnWhatsapp" style="display: none;">WhatsApp</button>
    </form>

    <div id="listaTurnosContainer">
        <h3>Turnos Agendados</h3>
        <div id="listaTurnos"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
