<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos Programados</title>
    <style>
        :root { 
            --bg-color: #121212; 
            --surface-color: #1e1e1e; 
            --primary-color: #00bcd4; 
            --text-main: #ffffff; 
            --text-muted: #b3b3b3; 
            --danger: #ff5252; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { background-color: var(--surface-color); padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header img { width: 50px; height: 50px; margin-right: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; background-color: #2c2c2c; border: 1px solid #444; color: var(--text-main); border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        
        /* Botón principal */
        button[type="submit"] { width: 100%; padding: 12px; background-color: var(--primary-color); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button[type="submit"]:hover { background-color: #00acc1; }

        /* Estilos de los botones con iconos */
        .btn-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            background-color: transparent;
            padding: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .btn-icon:hover { transform: scale(1.1); opacity: 0.9; }

        #mensajeError { color: var(--danger); font-size: 14px; margin-top: 10px; text-align: center; }
        #listaTurnosContainer { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        
        .turno-card { background-color: #2c2c2c; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary-color); position: relative; }
        .turno-card h4 { margin: 0 0 5px 0; color: var(--primary-color); text-transform: capitalize; }
        .turno-card p { margin: 3px 0; font-size: 13px; color: var(--text-main); }
        
        .actions-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-start;
            border-top: 1px solid #3d3d3d;
            padding-top: 10px;
        }

        /* Botones del formulario */
        .form-actions { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="logo.png" alt="Logo">
        <h1>Turnos Programados</h1>
    </div>
    <form id="turnoForm">
        <div class="form-group"><label>Cliente</label><input type="text" id="cliente" required></div>
        <div class="row">
            <div class="form-group"><label>Teléfono</label><input type="tel" id="telefono" required></div>
            <div class="form-group"><label>Dirección</label><input type="text" id="direccion" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>Fecha</label><input type="date" id="fecha" required></div>
            <div class="form-group"><label>Día</label><input type="text" id="diaVisual" readonly></div>
        </div>
        <div class="form-group"><label>Hora</label><input type="time" id="hora" required></div>
        <div class="form-group"><label>Descripción</label><textarea id="descripcion" rows="3" required></textarea></div>
        <div class="form-group"><label>Precio ($)</label><input type="number" id="precio"></div>
        <div id="mensajeError"></div>
        
        <button type="submit">Guardar Turno</button>
        
        <div class="form-actions">
            <button type="button" class="btn-icon" id="btnMaps" style="display: none;" title="Ver en Google Maps">
                <img src="maps.png" alt="Maps">
            </button>
            <button type="button" class="btn-icon" id="btnWhatsapp" style="display: none;" title="Contactar WhatsApp">
                <img src="whastapp.png" alt="WhatsApp">
            </button>
        </div>
    </form>

    <div id="listaTurnosContainer">
        <h3>Turnos Agendados</h3>
        <div id="listaTurnos"></div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
