<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnos Programados</title>

<style>
:root {
    --bg-color: #121212;
    --surface-color: #1e1e1e;
    --primary-color: #00bcd4;
    --text-main: #ffffff;
    --text-muted: #b3b3b3;
    --danger: #ff5252;
}

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    padding: 15px;
    display: flex;
    justify-content: center;
}

.container {
    background-color: var(--surface-color);
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}

.header img {
    width: 45px;
    margin-right: 10px;
}

.form-group { margin-bottom: 12px; }

label {
    display: block;
    margin-bottom: 5px;
    color: var(--text-muted);
    font-size: 13px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    background-color: #2c2c2c;
    border: 1px solid #444;
    color: var(--text-main);
    border-radius: 6px;
}

.row {
    display: flex;
    gap: 10px;
}

.row > div { flex: 1; }

button {
    width: 100%;
    padding: 12px;
    background-color: var(--primary-color);
    color: #000;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
}

/* LISTA */
#listaTurnosContainer {
    margin-top: 25px;
    border-top: 1px solid #333;
    padding-top: 15px;
}

.turno-card {
    background-color: #2c2c2c;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
    border-left: 4px solid var(--primary-color);
}

.turno-card h4 {
    margin-bottom: 8px;
    color: var(--primary-color);
}

.turno-card p {
    font-size: 13px;
    margin: 2px 0;
}

/* BOTONES CUADRADOS */
.acciones {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 10px;
    margin-top: 10px;
}

.btn-icon {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-icon img {
    width: 28px;
    height: 28px;
}

.maps { background: #4CAF50; }
.whatsapp { background: #25D366; }
.edit { background: #ffc107; }
.delete { background: #ff5252; }

/* RESPONSIVE */
@media (max-width: 500px) {
    .row {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <img src="logo.png">
        <h2>Turnos Programados</h2>
    </div>

    <form id="turnoForm">
        <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="cliente" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="telefono" required>
            </div>
            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="direccion" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fecha" required>
            </div>
            <div class="form-group">
                <label>Día</label>
                <input type="text" id="diaVisual" readonly>
            </div>
        </div>

        <div class="form-group">
            <label>Hora</label>
            <input type="time" id="hora" required>
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea id="descripcion" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Precio ($)</label>
            <input type="number" id="precio">
        </div>

        <div id="mensajeError"></div>

        <button type="submit">Guardar Turno</button>
    </form>

    <div id="listaTurnosContainer">
        <h3>Turnos Agendados</h3>
        <div id="listaTurnos"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
