<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos Programados - Portones Automáticos</title>
    <style>
        :root { 
            --bg-color: #121212; 
            --surface-color: #1e1e1e; 
            --primary-color: #00bcd4; 
            --text-main: #ffffff; 
            --text-muted: #b3b3b3; 
            --danger: #ff5252; 
            --success: #25D366;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        .card-panel { background-color: var(--surface-color); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header img { width: 50px; height: 50px; margin-right: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; background-color: #2c2c2c; border: 1px solid #444; color: var(--text-main); border-radius: 6px; box-sizing: border-box; }
        
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        
        button#btnGuardar { width: 100%; padding: 12px; background-color: var(--primary-color); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        
        .btn-icon-form { display: flex; gap: 10px; margin-top: 10px; }
        .btn-icon-form button { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }

        /* Estilos del Listado Agrupado */
        .dia-contenedor { margin-top: 25px; }
        .dia-titulo { 
            background: #333; 
            padding: 8px 15px; 
            border-radius: 6px; 
            color: var(--primary-color); 
            font-size: 18px; 
            margin-bottom: 10px;
            border-left: 5px solid var(--primary-color);
        }
        
        .turno-card { 
            background-color: #2c2c2c; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            position: relative;
        }
        .turno-card h4 { margin: 0 0 5px 0; color: #fff; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .turno-card p { margin: 4px 0; font-size: 14px; color: var(--text-muted); }
        .turno-card strong { color: var(--text-main); }

        .acciones-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .btn-accion { 
            background: #3d3d3d; 
            border: none; 
            border-radius: 6px; 
            padding: 8px; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: background 0.2s;
        }
        .btn-accion:hover { background: #4d4d4d; }
        .btn-accion img { width: 24px; height: 24px; object-fit: contain; }

        #mensajeError { color: var(--danger); font-size: 14px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="card-panel">
        <div class="header">
            <img src="logo.png" alt="Logo">
            <h1>Agenda de Turnos</h1>
        </div>
        <form id="turnoForm">
            <div class="form-group"><label>Cliente</label><input type="text" id="cliente" required></div>
            <div class="row">
                <div class="form-group"><label>Teléfono</label><input type="tel" id="telefono" required></div>
                <div class="form-group"><label>Dirección</label><input type="text" id="direccion" required></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Fecha</label><input type="date" id="fecha" required></div>
                <div class="form-group"><label>Día</label><input type="text" id="diaVisual" readonly></div>
            </div>
            <div class="form-group"><label>Hora</label><input type="time" id="hora" required></div>
            <div class="form-group"><label>Descripción / Servicio</label><textarea id="descripcion" rows="2" required></textarea></div>
            <div class="form-group"><label>Precio Estimado ($)</label><input type="number" id="precio"></div>
            
            <div id="mensajeError"></div>
            
            <button type="submit" id="btnGuardar">Guardar Turno</button>
            
            <div class="btn-icon-form">
                <button type="button" class="btn-maps" id="btnMaps" style="display: none; background: #4285F4; color: white;">
                    <img src="maps.png" width="20" style="margin-right:8px"> Ver Ubicación
                </button>
                <button type="button" class="btn-whatsapp" id="btnWhatsapp" style="display: none; background: #25D366; color: white;">
                    <img src="whastapp.png" width="20" style="margin-right:8px"> Probar WhatsApp
                </button>
            </div>
        </form>
    </div>

    <div id="listaTurnosContainer">
        <h2 style="text-align: center; color: var(--text-muted);">Próximas Visitas</h2>
        <div id="listadoAgrupado"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
