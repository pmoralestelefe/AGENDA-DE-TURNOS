<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos Programados</title>
    <style>
        :root { --bg-color: #121212; --surface-color: #1e1e1e; --primary-color: #00bcd4; --text-main: #ffffff; --text-muted: #b3b3b3; --danger: #ff5252; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { background-color: var(--surface-color); padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header img { width: 50px; height: 50px; margin-right: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; background-color: #2c2c2c; border: 1px solid #444; color: var(--text-main); border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        button { width: 100%; padding: 12px; background-color: var(--primary-color); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-maps { background-color: #4CAF50; color: white; margin-top: 5px; }
        .btn-whatsapp { background-color: #25D366; color: white; margin-top: 5px; }
        .btn-edit { background-color: #ffb300; color: black; margin-top: 5px; }
        .btn-delete { background-color: #ff5252; color: white; margin-top: 5px; }
        #mensajeError { color: var(--danger); font-size: 14px; margin-top: 10px; text-align: center; }
        
        /* ESTILOS PARA LAS PESTAÑAS */
        #listaTurnosContainer { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 20px; padding-bottom: 5px; }
        .tabs::-webkit-scrollbar { height: 6px; }
        .tabs::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .tab-btn { flex: 1; min-width: 75px; padding: 10px 5px; background-color: #2c2c2c; color: var(--text-muted); border: 1px solid #444; margin-top: 0; font-size: 13px; }
        .tab-btn.active { background-color: var(--primary-color); color: #000; border-color: var(--primary-color); }
        
        /* ESTILOS HOJAS POR DÍA */
        .hoja-dia { display: none; }
        .hoja-dia.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .turno-card { background-color: #2c2c2c; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary-color); }
        .turno-card h4 { margin: 0 0 10px 0; color: var(--primary-color); font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .turno-card p { margin: 5px 0; font-size: 14px; }
        .turno-acciones { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 15px; }
        .turno-acciones button { width: calc(50% - 5px); padding: 8px; font-size: 13px; margin-top: 0; }
        .mensaje-vacio { text-align: center; color: var(--text-muted); font-style: italic; padding: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
        <h1>Turnos Programados</h1>
    </div>
    <form id="turnoForm">
        <div class="form-group"><label>Cliente</label><input type="text" id="cliente" required></div>
        <div class="row">
            <div class="form-group"><label>Teléfono</label><input type="tel" id="telefono" required></div>
            <div class="form-group"><label>Dirección</label><input type="text" id="direccion" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>Fecha</label><input type="date" id="fecha" required></div>
            <div class="form-group"><label>Día</label><input type="text" id="diaVisual" readonly></div>
        </div>
        <div class="form-group"><label>Hora</label><input type="time" id="hora" required></div>
        <div class="form-group"><label>Descripción</label><textarea id="descripcion" rows="3" required></textarea></div>
        <div class="form-group"><label>Precio ($)</label><input type="number" id="precio"></div>
        <div id="mensajeError"></div>
        <button type="submit">Guardar Turno</button>
        <button type="button" class="btn-maps" id="btnMaps" style="display: none;">Ver en Google Maps</button>
        <button type="button" class="btn-whatsapp" id="btnWhatsapp" style="display: none;">Contactar WhatsApp</button>
    </form>
    
    <div id="listaTurnosContainer">
        <h3>Turnos Agendados</h3>
        
        <!-- PESTAÑAS (Fijate que "data-target" ahora no tiene acentos para evitar errores) -->
        <div class="tabs">
            <button type="button" class="tab-btn active" data-target="Lunes">Lunes</button>
            <button type="button" class="tab-btn" data-target="Martes">Martes</button>
            <button type="button" class="tab-btn" data-target="Miercoles">Miérc.</button>
            <button type="button" class="tab-btn" data-target="Jueves">Jueves</button>
            <button type="button" class="tab-btn" data-target="Viernes">Viernes</button>
            <button type="button" class="tab-btn" data-target="Sabado">Sábado</button>
        </div>

        <!-- HOJAS POR DÍA (Tampoco tienen acentos en los ID) -->
        <div id="hojasTurnos">
            <div class="hoja-dia active" id="hoja-Lunes"></div>
            <div class="hoja-dia" id="hoja-Martes"></div>
            <div class="hoja-dia" id="hoja-Miercoles"></div>
            <div class="hoja-dia" id="hoja-Jueves"></div>
            <div class="hoja-dia" id="hoja-Viernes"></div>
            <div class="hoja-dia" id="hoja-Sabado"></div>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
